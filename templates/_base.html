<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>potyk-mu</title>
    <style>
        body {
            max-width: 700px;
            margin: auto;
            font-family: "Rubik", system-ui;
        }

        @keyframes beat {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
            }
        }

        .header-logo {
            cursor: pointer;
            user-select: none;
        }

        .header-logo--playing {
            animation: beat var(--beat-dur, 0.5s) ease-in-out infinite;
        }
    </style>

    {% block style %}
    {% endblock %}

</head>


<body style="background: limegreen">
<header style="padding: 20px; display: flex; gap: 10px; justify-content: center; ">
    <div id="potyk-mu-logo"
         class="header-logo"
         style="text-decoration: none; border: 4px solid black; font-weight: bold; color: black; border-radius: 10px; padding: 5px; background: limegreen;"
         role="button"
         tabindex="0"
         aria-label="Воспроизвести или приостановить трек">

        <span style="transform: rotate(180deg); display: inline-block">🔊</span>
        potyk-mu
        🔊
    </div>
</header>

<audio id="potyk-mu-ragga"
       preload="metadata"
       src="{{ url_for('static', filename='Dj Starscream, N8LOC, B Boy 3000 - Ragga 2001.mp3') }}"></audio>

<main>
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}


    {% block main %}
    {% endblock %}
</main>
<script>
    (function () {
        const logo = document.getElementById('potyk-mu-logo');
        const audio = document.getElementById('potyk-mu-ragga');
        if (!logo || !audio) return;

        /** Спокойные участки — медленный пульс; сильный бас — быстрее (до ~0.01s). */
        const BEAT_SLOW_S = 50;
        const BEAT_FAST_S = 0.01;
        const BASS_BIN_COUNT = 200;
        const BASS_GAIN = 2.2;
        const SMOOTH = 1;

        let audioCtx = null;
        let analyser = null;
        let freqData = null;
        let graphReady = false;
        let rafId = 0;
        let smoothedBeatS = BEAT_SLOW_S;

        function clamp(x, lo, hi) {
            return Math.max(lo, Math.min(hi, x));
        }

        function ensureAudioGraph() {
            if (graphReady) {
                return Promise.resolve();
            }
            return new Promise(function (resolve, reject) {
                try {
                    const Ctx = window.AudioContext || window.webkitAudioContext;
                    audioCtx = new Ctx();
                    const source = audioCtx.createMediaElementSource(audio);
                    analyser = audioCtx.createAnalyser();
                    analyser.fftSize = 512;
                    analyser.smoothingTimeConstant = 0.62;
                    source.connect(analyser);
                    analyser.connect(audioCtx.destination);
                    freqData = new Uint8Array(analyser.frequencyBinCount);
                    graphReady = true;
                    resolve();
                } catch (err) {
                    reject(err);
                }
            });
        }

        function stopBeatLoop() {
            if (rafId) {
                cancelAnimationFrame(rafId);
                rafId = 0;
            }
        }

        function tickBeat() {
            if (!graphReady || !analyser || audio.paused) {
                return;
            }
            analyser.getByteFrequencyData(freqData);
            var sum = 0;
            var binN = Math.min(BASS_BIN_COUNT, freqData.length);
            for (var i = 0; i < binN; i++) {
                sum += freqData[i];
            }
            var raw = sum / binN / 255;
            var drive = clamp(raw * BASS_GAIN, 0, 1);
            var target = BEAT_SLOW_S + (BEAT_FAST_S - BEAT_SLOW_S) * drive;
            smoothedBeatS += (target - smoothedBeatS) * SMOOTH;
            logo.style.setProperty('--beat-dur', smoothedBeatS.toFixed(3) + 's');
            rafId = requestAnimationFrame(tickBeat);
        }

        function setPlaying(playing) {
            logo.classList.toggle('header-logo--playing', playing);
            if (!playing) {
                stopBeatLoop();
                logo.style.removeProperty('--beat-dur');
                smoothedBeatS = BEAT_SLOW_S;
            }
        }

        function beginAudioPlayback() {
            return ensureAudioGraph()
                .then(function () {
                    return audioCtx.resume();
                })
                .then(function () {
                    return audio.play();
                })
                .then(function () {
                    setPlaying(true);
                    stopBeatLoop();
                    rafId = requestAnimationFrame(tickBeat);
                });
        }

        function toggle() {
            if (audio.paused) {
                if (audio.ended) {
                    audio.currentTime = 0;
                }
                beginAudioPlayback().catch(function () {
                    setPlaying(false);
                });
            } else {
                audio.pause();
                setPlaying(false);
            }
        }

        function loadAndPlay(src) {
            audio.src = src;
            audio.load();
            smoothedBeatS = BEAT_SLOW_S;
            return beginAudioPlayback().catch(function () {
                setPlaying(false);
            });
        }

        window.potykMu = { loadAndPlay: loadAndPlay };

        logo.addEventListener('click', toggle);
        logo.addEventListener('keydown', function (e) {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                toggle();
            }
        });
        audio.addEventListener('ended', function () {
            setPlaying(false);
        });
    })();
</script>
{% block page_scripts %}
{% endblock %}
</body>
</html>
